<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego de Memoria - Personajes Bíblicos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-container {
            perspective: 1000px;
            display: inline-block;
            margin: 10px;
        }
        .card {
            width: 200px;
            height: 250px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s;
            cursor: pointer;
        }
        .card.flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border: 1px solid #ccc;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-front {
            background: #f8f9fa;
        }
        .card-back {
            background: #fff;
            transform: rotateY(180deg);
        }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5 text-center">
    <h1 class="mb-4">Juego de Memoria</h1>

    {% for character in characters %}
        <div class="card-container">
            <div class="card" onclick="this.classList.toggle('flipped')">
                <div class="card-face card-front">
                    <img src="{{ character.image.url }}" alt="{{ character.name }}" style="max-width:100%; max-height:100%;">
                </div>
                <div class="card-face card-back">
                    <p class="fw-bold">{{ character.name }}</p>
                </div>
            </div>
        </div>
    {% endfor %}
</div>

<script>
    // Aquí podrías añadir lógica para verificar pares seleccionados
</script>

</body>
</html>
