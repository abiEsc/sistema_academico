{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Olimpiadas Bíblicas - Hechos de los Apóstoles</title>
    <!-- Bootstrap CSS desde CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1 class="text-center text-primary mb-4">Olimpiadas Bíblicas - Hechos de los Apóstoles</h1>

    <form method="post" class="card p-4 shadow">
        {% csrf_token %}
        {% for question in questions %}
            <div class="mb-4">
                <p class="fw-bold">{{ question.text }}</p>
                <div class="form-check">
                    {% for option in question.options.all %}
                        <label class="form-check-label d-block">
                            <input type="radio" class="form-check-input" name="question_{{ question.id }}" value="{{ option.id }}">
                            {{ option.text }}
                        </label>
                    {% endfor %}
                </div>
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-success w-100">Enviar respuestas</button>
    </form>
</div>

<!-- Bootstrap JS desde CDN -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
