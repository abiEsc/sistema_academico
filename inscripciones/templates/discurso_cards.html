<!DOCTYPE html>
<html>
<head>
    <title>Discursos</title>
    <!-- Incluye Bootstrap desde CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f5f5; /* color de fondo suave */
        }
        h2 {
            text-align: center; /* centra el título */
            color: #2c3e50;     /* color del título */
            font-weight: bold;
        }
        .card {
            background-color: #eaf2f8; /* color de fondo de cada tarjeta */
            border: 1px solid #3498db; /* borde azul */
        }
        .card-title {
            color: #1a5276; /* color del título dentro de la tarjeta */
        }
    </style>
</head>
<body class="container mt-4">
    <h2 class="mb-4">DISCURSOS</h2>
    <div class="row">
      {% for d in discursos %}
        <div class="col-md-4 mb-3">
          <div class="card h-100 shadow-sm">
            <div class="card-body">
              <h5 class="card-title">{{ d.cita_biblica }}</h5>
              <p class="card-text"><strong>Tema:</strong> {{ d.tema_central }}</p>
              <p class="card-text"><strong>Orador:</strong> {{ d.orador }}</p>
              <p class="card-text"><strong>Audiencia:</strong> {{ d.audiencia }}</p>
            </div>
          </div>
        </div>
      {% endfor %}
    </div>
</body>
</html>
