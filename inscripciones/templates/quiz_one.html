<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ question.text }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .correct {
            border: 2px solid green;
            background-color: #e6ffe6;
            padding: 5px;
            border-radius: 5px;
        }
        #timer {
            font-size: 1.5rem;
            font-weight: bold;
            color: #dc3545; /* rojo */
        }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4">{{ question.text }}</h2>

    <!-- Cronómetro -->
    <p>Tiempo restante: <span id="timer">15</span> segundos</p>

    {% for option in question.options.all %}
        <div id="option-{{ option.id }}" class="form-check mb-2">
            <input type="radio" class="form-check-input" name="option" value="{{ option.id }}">
            <label class="form-check-label">{{ option.text }}</label>
        </div>
    {% endfor %}

    <a href="?q={{ index|add:1 }}" class="btn btn-primary mt-3">Siguiente pregunta</a>
</div>

<script>
    let timeLeft = 15; // segundos
    const timerElement = document.getElementById("timer");

    const countdown = setInterval(function() {
        timeLeft--;
        timerElement.textContent = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(countdown);
            // Resaltar la opción correcta
            const correctElement = document.getElementById("option-{{ correct_option_id }}");
            if (correctElement) {
                correctElement.classList.add("correct");
            }
        }
    }, 1000); // cada segundo
</script>

</body>
</html>
