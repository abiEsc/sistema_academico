{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Olimpiadas Bíblicas - Hechos de los Apóstoles</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .numero-pregunta {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #007bff;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 10px;
            flex-shrink: 0;
        }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1 class="text-center text-primary mb-4">Olimpiadas Bíblicas - Hechos de los Apóstoles</h1>

    <form method="post" class="card p-4 shadow">
        {% csrf_token %}
        {% for question in questions %}
            <div class="card mb-3 shadow">
                <div class="card-header d-flex align-items-center">
                    <!-- Número en círculo -->
                    <div class="numero-pregunta">
                        {{ forloop.counter }}
                    </div>
                    <!-- Botón que despliega la pregunta -->
                    <button class="btn btn-link fw-bold" type="button" 
                            data-bs-toggle="collapse" 
                            data-bs-target="#pregunta{{ forloop.counter }}">
                        Pregunta {{ forloop.counter }}
                    </button>
                </div>

                <!-- Contenido oculto -->
                <div id="pregunta{{ forloop.counter }}" class="collapse">
                    <div class="card-body">
                        <p class="card-text fw-bold">{{ question.text }}</p>
                        {% for option in question.options.all %}
                            <div class="form-check">
                                <input type="radio" class="form-check-input" 
                                       name="question_{{ question.id }}" 
                                       value="{{ option.id }}">
                                <label class="form-check-label">{{ option.text }}</label>
                            </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-success w-100">Enviar respuestas</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
